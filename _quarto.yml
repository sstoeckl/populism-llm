project:
  type: website
  output-dir: _site
  resources:
    - "data/*.parquet"
    - "data/*.json"

website:
  title: "Populism-LLM"
  description: "LLM-annotated populism and liberalism scores for 3,327 European party manifestos"
  site-url: "https://sstoeckl.github.io/populism-llm/"
  repo-url: "https://github.com/sstoeckl/populism-llm"
  repo-actions: [issue]
  page-navigation: true
  search:
    location: navbar
    type: overlay
  navbar:
    background: dark
    logo: assets/logo.svg
    left:
      - href: index.qmd
        text: Home
      - href: browse.qmd
        text: Browse
      - href: cross-model.qmd
        text: Cross-Model Agreement
      - href: interactive/regression.qmd
        text: Interactive Regressions
      - href: methodology.qmd
        text: Methodology
      - href: download.qmd
        text: Data & Reproduction
    right:
      - icon: github
        href: https://github.com/sstoeckl/populism-llm
        aria-label: GitHub
  page-footer:
    left: |
      **Research:** Martin Rode (Universidad de Navarra) · Sebastian Stöckl (University of Liechtenstein) — *The Milei question, or: How liberal are right-wing populist parties?* (working paper).
    center: |
      **Site maintainer:** [Sebastian Stöckl](http://www.sebastianstoeckl.com) · code [MIT](https://opensource.org/licenses/MIT) · data [CC-BY 4.0](https://creativecommons.org/licenses/by/4.0/)
    right: |
      Built with [Quarto](https://quarto.org). DOI &nbsp;tba
  open-graph: true
  twitter-card: false
  body-header: |
    <div class="draft-banner" role="alert">
      <strong>🚧 PREVIEW / DRAFT</strong> · Working paper, not peer-reviewed.
      Numbers and methodology may change. Do not cite —
      <a href="mailto:sebastian.stoeckl@uni.li">sebastian.stoeckl@uni.li</a>.
    </div>

format:
  html:
    theme:
      light: [cosmo, assets/css/custom.scss]
      dark:  [darkly, assets/css/custom-dark.scss]
    css: assets/css/site.css
    toc: true
    toc-depth: 3
    code-fold: false
    code-copy: true
    smooth-scroll: true
    fig-width: 8
    fig-height: 5
    fig-dpi: 150
    page-layout: article

execute:
  freeze: auto
  warning: false
  message: false

